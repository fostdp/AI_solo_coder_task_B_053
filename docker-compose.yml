version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: porcelain_monitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
      - "8081:8081"
      - "34964:34964"
      - "9090:9090"
    environment:
      PM_DB_HOST: postgres
      PM_DB_PORT: 5432
      PM_DB_NAME: porcelain_monitor
      PM_DB_USER: postgres
      PM_DB_PASSWORD: postgres
      PM_DB_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    environment:
      SIM_SERVER_IP: backend
      SIM_SERVER_PORT: 34964
      SIM_INTERVAL_MS: 10800000
      SIM_LASER_COUNT: 20
      SIM_VIBRATION_COUNT: 40
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
